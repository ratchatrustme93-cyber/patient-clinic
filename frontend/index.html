<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Clinic</title>
    <script>
      // อ่าน theme ก่อนวาดหน้าจอ — กันจอกะพริบสลับสีตอนโหลด
      // รับเฉพาะชื่อที่รู้จัก ค่าเก่าที่ถูกลบไปแล้วจะตกกลับมาใช้ค่าเริ่มต้นเอง
      try {
        var t = localStorage.getItem('pc.theme')
        if (t === 'classic') document.documentElement.dataset.theme = t
        var l = localStorage.getItem('pc.lang')
        document.documentElement.lang = l === 'en' ? 'en' : 'th'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
